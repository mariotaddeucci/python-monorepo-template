name: CI

on:
  push:
    branches: ["main"]
    tags-ignore: ["**"]   # tags disparam o workflow de publish
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run ruff check
        run: uv run ruff check packages/

      - name: Run ruff format check
        run: uv run ruff format --check packages/

  static-analysis:
    name: Static Analysis (prek on changed files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necessário para comparar refs

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Prepare prek hook environments
        run: uv run prek prepare-hooks

      - name: Run prek on changed files (pull_request)
        if: github.event_name == 'pull_request'
        run: uv run prek run --from-ref ${{ github.event.pull_request.base.sha }} --to-ref ${{ github.sha }}

      - name: Run prek on changed files (push)
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            uv run prek run --from-ref ${{ github.sha }}^ --to-ref ${{ github.sha }}
          else
            uv run prek run --from-ref ${{ github.event.before }} --to-ref ${{ github.sha }}
          fi

  test:
    name: Test / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: static-analysis
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necessário para hatch-vcs ler tags git

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run tests
        run: uv run pytest --tb=short
