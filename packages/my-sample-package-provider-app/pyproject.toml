[project]
name = "my-sample-package-provider-app"
dynamic = ["version"]
description = "Application layer of the monorepo"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
core = [
    "my-sample-package-provider-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
tag-pattern = "^my-sample-package-provider-app:(?P<version>.+)$"
raw-options = { root = "../..", version_scheme = "no-guess-dev" }

[tool.hatch.build.hooks.vcs]
version-file = "src/app/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/app"]

[tool.uv]
python = "3.12"

[tool.uv.sources]
my-sample-package-provider-core = { workspace = true }

[tool.taskipy.tasks]
test    = { cmd = "pytest tests/", help = "Run app tests" }
lint    = { cmd = "ruff check src/ tests/ && pyrefly check src/", help = "Lint and type-check app sources" }
autofix = { cmd = "ruff check --fix src/ tests/ && ruff format src/ tests/", help = "Autofix and format app sources" }
format  = { cmd = "ruff format src/ tests/", help = "Format app sources" }
docs    = { cmd = "mkdocs serve", help = "Serve app docs" }
