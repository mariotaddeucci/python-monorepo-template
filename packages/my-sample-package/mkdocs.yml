INHERIT: ../../mkdocs.base.yml

site_name: my-sample-package

docs_dir: docs/
site_dir: ../../site/packages/my-sample-package/

nav:
  - Overview: index.md
  - Usage: usage.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
